<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>City of Fort Collins - Semantic Links Fix</title>
  <style>
    label { display: block; margin-bottom: 4px; font-weight: bold; }
    input, select { margin-bottom: 12px; display: block; }
  </style>
</head>
<body>
  <main>
    <h1>City Services</h1>

    <!-- Before: "click here" links - now fixed -->
    <h2>Utilities</h2>
    <p>Manage your water, electric, and broadband accounts.</p>
    <a href="#">Pay your utilities bill</a>

    <h2>Parking</h2>
    <p>View parking rules and permit options.</p>
    <a href="#">Pay a parking ticket</a>

    <!-- Accessible form example -->
    <h2>Contact Us</h2>
    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required>

      <label for="topic">Topic</label>
      <select id="topic" name="topic">
        <option value="">Select a topic</option>
        <option value="utilities">Utilities</option>
        <option value="parks">Parks</option>
        <option value="other">Other</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4"></textarea>

      <button type="submit">Send message</button>
    </form>
  </main>
</body>
</html>
