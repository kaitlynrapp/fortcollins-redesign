<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>City of Fort Collins - Alt Text Fix</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; color: #1a1a1a; }
    img { max-width: 300px; display: block; margin: 12px 0; }
  </style>
</head>
<body>
  <header>
    <img src="https://www.fortcollins.gov/ImageRepository/Document?documentId=71456"
         alt="City of Fort Collins official logo">
  </header>
  <main>
    <h1>Parks and Natural Areas</h1>
    <h2>Aerial View of Fort Collins</h2>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/FortCollinsColorado.jpg/320px-FortCollinsColorado.jpg"
         alt="Aerial view of Fort Collins neighborhoods with the Rocky Mountains visible in the background">
    <p>Explore over 900 acres of natural areas and 40 community parks.</p>
    <h2>Decorative Image Example</h2>
    <p>The image below is decorative so screen readers skip it.</p>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/FortCollinsColorado.jpg/320px-FortCollinsColorado.jpg"
         alt="" role="presentation">
  </main>
</body>
</html>
